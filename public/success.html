<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome! - Nonfiction Blueprint</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      background: var(--color-cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .success-container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    .success-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      color: var(--color-dark);
      margin-bottom: 16px;
    }
    .success-text {
      font-size: 17px;
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .success-btn {
      display: inline-block;
      padding: 18px 40px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-body);
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .success-btn:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .success-note {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">&#127881;</div>
    <h1 class="success-title">You're in!</h1>
    <p class="success-text">
      Your payment was successful. You now have full access to the complete 21-day Nonfiction Blueprint methodology.
      <br><br>
      Your book starts today. Let's go.
    </p>
    <a href="/app.html" class="success-btn">Start Your 21-Day Journey &rarr;</a>
    <p class="success-note">
      A receipt has been sent to your email from CS Ventures LLC.
    </p>
  </div>
</body>
</html>
